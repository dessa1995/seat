<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자리 배치 프로그램 - 기능 강화판</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            --bg-color: #f8faff;
            --border-color: #333;
            --desk-bg: #ffffff;
            --desk-fixed-bg: #ffecb3;
            --desk-hidden-bg: #cfd8dc;
            --desk-selected-bg: #ffcdd2;
            --button-bg: #eceff1;
            --button-hover-bg: #cfd8dc;
            --accent-color: #e53935;
            --grid-size: 50px; 
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: #263238;
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .custom-border {
            border: 3px solid var(--border-color);
            box-shadow: 4px 4px 0px 0px var(--border-color);
            background-color: white;
            padding: 1rem;
            border-radius: 8px;
        }

        h1 { text-align: center; margin: 0 0 0.5rem 0; font-size: 1.4rem; color: #1a237e; }
        h2, h3 { margin: 0 0 0.8rem 0; padding-bottom: 0.4rem; border-bottom: 3px solid var(--border-color); font-size: 1rem; }

        .app-container {
            display: flex;
            flex-wrap: nowrap;
            gap: 1rem;
            flex-grow: 1;
            min-height: 0;
        }

        .controls {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .seating-chart-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden; 
            background-color: #fff;
        }

        .seating-chart-container.show-grid {
            background-image: radial-gradient(#d1d1d1 1.5px, transparent 1.5px);
            background-size: var(--grid-size) var(--grid-size);
        }

        .btn {
            font-family: inherit; font-size: 0.8rem; padding: 0.5rem 0.6rem;
            border: 2px solid var(--border-color); background-color: var(--button-bg);
            cursor: pointer; box-shadow: 2px 2px 0px 0px var(--border-color);
            border-radius: 4px; color: #263238; transition: all 0.1s;
            text-align: center; white-space: nowrap; letter-spacing: -0.8px;
        }
        .btn:hover { background-color: var(--button-hover-bg); transform: translate(1px, 1px); box-shadow: 1px 1px 0px 0px var(--border-color); }
        .btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px var(--border-color); }

        .btn-group { display: flex; flex-wrap: wrap; gap: 0.4rem; width: 100%; }
        input[type="text"], input[type="number"] {
            font-family: inherit; font-size: 0.9rem; padding: 0.35rem;
            border: 2px solid var(--border-color); border-radius: 4px;
        }
        
        .layout-controls div { display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%; }
        .layout-controls label { font-size: 0.85rem; white-space: nowrap; flex-shrink: 0; letter-spacing: -1px; }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; flex-shrink: 0; }
        .switch input { display:none; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; border: 2px solid var(--border-color); transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px;
            background-color: white; border: 2px solid var(--border-color); transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #4caf50; }
        input:checked + .slider:before { transform: translateX(20px); }

        .direction-btn-group { display: flex; border: 2px solid var(--border-color); border-radius: 4px; overflow: hidden; }
        .direction-btn { padding: 4px 8px; font-size: 0.75rem; cursor: pointer; background: #eee; border: none; font-weight: bold; }
        .direction-btn.active { background: #455a64; color: white; }

        #student-list {
            list-style: none; padding: 0; margin: 0.5rem 0;
            max-height: 140px; overflow-y: auto; border: 2px solid var(--border-color); border-radius: 4px;
        }
        #student-list li {
            padding: 0.4rem; display: flex; justify-content: space-between; align-items: center;
            background-color: #fff; font-size: 0.8rem; border-bottom: 1px solid #eee;
        }

        #teacher-desk {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 160px; height: 50px; background-color: #cfd8dc; border: 3px solid var(--border-color);
            box-shadow: 3px 3px 0px 0px var(--border-color); display: flex; justify-content: center;
            align-items: center; font-weight: bold; z-index: 100; border-radius: 6px;
            transition: all 0.5s ease;
        }
        #teacher-desk.top { top: 20px; }
        #teacher-desk.bottom { bottom: 20px; }
        
        #seating-chart { position: absolute; transform-origin: top left; transition: all 0.5s ease; }

        .desk {
            position: absolute; width: 100px; height: 60px; background-color: var(--desk-bg);
            border: 3px solid var(--border-color); box-shadow: 3px 3px 0px 0px var(--border-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: grab; user-select: none; z-index: 10; border-radius: 6px; box-sizing: border-box;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        .desk.dragging { z-index: 1000; cursor: grabbing; opacity: 0.8; box-shadow: 6px 6px 12px rgba(0,0,0,0.2); transition: none !important; }
        .desk.fixed { background-color: var(--desk-fixed-bg); }
        .desk.selected-for-swap { background-color: var(--desk-selected-bg); border-color: var(--accent-color); transform: scale(1.05); z-index: 101; }
        .desk.hidden .student-info { visibility: hidden; }
        .desk.hidden { background-color: var(--desk-hidden-bg); }

        .desk-header { position: absolute; top: -2px; right: -2px; display: flex; gap: 2px; }
        .desk-btn { font-size: 0.55rem; padding: 1px 3px; border: 1.5px solid var(--border-color); background-color: var(--button-bg); cursor: pointer; border-radius: 3px; }
        .desk-btn.btn-swap { background-color: #e3f2fd; font-weight: bold; color: #1565c0; border-color: #1565c0; }
        .desk-btn.btn-swap.active { background-color: var(--accent-color); color: white; border-color: var(--border-color); }
        
        .student-info { text-align: center; font-size: 0.8rem; line-height: 1.2; pointer-events: none; }
        .student-name { font-weight: bold; color: #1a237e; }
        .student-gender { font-size: 0.7rem; color: #546e7a; }

        #fullscreen-controls {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2020; background: white; padding: 0.8rem; border-radius: 8px;
            border: 3px solid var(--border-color); box-shadow: 3px 3px 0px 0px var(--border-color);
        }
        body.fullscreen-mode #fullscreen-controls { display: flex; gap: 0.5rem; }
        body.fullscreen-mode .controls, body.fullscreen-mode h1 { display: none; }
        body.fullscreen-mode .seating-chart-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 2000; padding: 0; border: none; }

        #confirm-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center;
        }
        #confirm-modal { background: white; padding: 1.5rem; border-radius: 8px; border: 3px solid var(--border-color); text-align: center; }

        @media print {
            body * { visibility: hidden; }
            #seating-chart-area, #seating-chart-area * { visibility: visible !important; }
            #seating-chart-area { position: absolute; left: 0; top: 0; width: 100% !important; height: 100% !important; border: none !important; box-shadow: none !important; margin:0 !important; padding:0 !important; }
            .desk-header, #fullscreen-controls { display: none !important; }
        }
    </style>
</head>
<body>

    <h1>교실 자리 배치 프로그램</h1>

    <div class="app-container">
        <div class="controls custom-border">
            <section>
                <h2>학생 명렬 관리</h2>
                <div class="btn-group">
                    <a href="https://drive.google.com/uc?export=download&id=14U3BCnAlipCbsPWru9v-FhlXM8fQC_w7" download="학생명단_양식.xlsx" class="btn" style="background-color: #e3f2fd;">양식 다운로드</a>
                    <button id="upload-file" class="btn">명단 업로드</button>
                    <input type="file" id="file-input" accept=".csv, .xlsx" style="display: none;">
                    <button id="download-current-csv" class="btn">현재 명단 저장</button>
                </div>
                <div id="student-form">
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="student-number" placeholder="번호" style="width: 55px;">
                        <input type="text" id="student-name" placeholder="이름" style="flex: 1;" required>
                    </div>
                    <div class="gender-select">
                        <label><input type="radio" name="gender" value="M" checked> 남</label>
                        <label><input type="radio" name="gender" value="F"> 여</label>
                        <button id="add-student-btn" class="btn" style="margin-left: auto;">추가/수정</button>
                    </div>
                </div>
                <ul id="student-list"></ul>
                <button id="delete-all-students" class="btn" style="width: 100%; color: var(--accent-color);">학생 명단 전체 삭제</button>
            </section>

            <section>
                <h3>배치 설정 및 도구</h3>
                <div class="layout-controls">
                    <div class="btn-group">
                        <button id="shuffle-seats" class="btn" style="background-color: #fff9c4; flex: 1;">자리 섞기</button>
                        <button id="apply-layout" class="btn" style="flex: 1;">대형 초기화</button>
                    </div>
                    <div>
                        <label>배정 방향</label>
                        <div class="direction-btn-group">
                            <button class="direction-btn active" data-dir="horizontal">가로</button>
                            <button class="direction-btn" data-dir="vertical">세로</button>
                        </div>
                    </div>
                    <div>
                        <label>한 줄 인원</label>
                        <input type="number" id="layout-cols" value="6" min="1" style="width: 50px;">
                    </div>
                    <div>
                        <label>짝꿍 모드</label>
                        <label class="switch"><input type="checkbox" id="pair-mode"><span class="slider"></span></label>
                        <button id="toggle-flip" class="btn" style="margin-left:auto; font-size: 0.75rem; background-color: #fce4ec; padding: 4px 6px;">상하반전 모드</button>
                    </div>
                    <div>
                        <label>일괄 이동</label>
                        <label class="switch"><input type="checkbox" id="move-all-toggle"><span class="slider"></span></label>
                    </div>
                    <div class="btn-group">
                        <button id="align-all-btn" class="btn" style="flex: 1;">자석 줄맞춤</button>
                        <button id="center-align-btn" class="btn" style="flex: 1;">가운데 정렬</button>
                    </div>
                    <div class="btn-group">
                        <button id="toggle-hide" class="btn" style="flex: 1;">이름 가리기</button>
                        <button id="fullscreen-btn" class="btn" style="flex: 1;">전체 화면</button>
                    </div>
                    <button id="export-pdf" class="btn" style="width: 100%; background-color: #66bb6a; color: white;">배치도 PDF 저장</button>
                </div>
            </section>
        </div>

        <div id="seating-chart-area" class="seating-chart-container custom-border">
            <div id="teacher-desk" class="top">교 탁</div>
            <div id="fullscreen-controls">
                <button id="fs-shuffle-btn" class="btn">자리 섞기</button>
                <button id="fs-toggle-hide-btn" class="btn">이름 가리기</button>
                <button id="exit-fullscreen-btn" class="btn">나가기</button>
            </div>
            <div id="seating-chart"></div>
        </div>
    </div>
    
    <div id="confirm-modal-overlay">
        <div id="confirm-modal">
            <p id="confirm-modal-message"></p>
            <div class="btn-group" style="justify-content: center;">
                <button id="confirm-modal-yes" class="btn">확인</button>
                <button id="confirm-modal-no" class="btn">취소</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let students = [];
            let desks = []; 
            let areDesksHidden = false;
            let isFlipped = false; 
            let selectedDeskForSwap = null; 

            const DESK_WIDTH = 100;
            const DESK_HEIGHT = 60;
            const GRID_SIZE = 50; 
            const H_GAP = 20; 
            const V_GAP = 30; 
            const PAIR_GAP = 4;

            const fileInput = document.getElementById('file-input');
            const studentNumberInput = document.getElementById('student-number');
            const studentNameInput = document.getElementById('student-name');
            const studentListUl = document.getElementById('student-list');
            const seatingChartArea = document.getElementById('seating-chart-area');
            const seatingChartDiv = document.getElementById('seating-chart');
            const teacherDesk = document.getElementById('teacher-desk');
            const moveAllToggle = document.getElementById('move-all-toggle');
            const confirmModalOverlay = document.getElementById('confirm-modal-overlay');

            function loadFromStorage() {
                const savedStudents = localStorage.getItem('seating_students');
                const savedDesks = localStorage.getItem('seating_desks');
                const savedFlip = localStorage.getItem('seating_flipped');
                if (savedFlip) { isFlipped = JSON.parse(savedFlip); updateFlipUI(); }
                if (savedStudents) { students = JSON.parse(savedStudents); updateStudentList(); }
                if (savedDesks) { reconstructDesks(JSON.parse(savedDesks)); }
            }

            function saveToStorage() {
                localStorage.setItem('seating_students', JSON.stringify(students));
                const deskState = desks.map(d => ({
                    studentId: d.student.id,
                    left: d.element.style.left,
                    top: d.element.style.top,
                    fixed: d.fixed,
                    rotation: d.rotation || 0
                }));
                localStorage.setItem('seating_desks', JSON.stringify(deskState));
                localStorage.setItem('seating_flipped', JSON.stringify(isFlipped));
            }

            function reconstructDesks(deskData) {
                seatingChartDiv.innerHTML = '';
                desks = [];
                deskData.forEach(data => {
                    const student = students.find(s => s.id === data.studentId);
                    if (student) {
                        const deskElement = createDeskElement(student, desks.length);
                        deskElement.style.left = data.left;
                        deskElement.style.top = data.top;
                        const deskObj = { element: deskElement, student: student, fixed: !!data.fixed, rotation: data.rotation || 0 };
                        if (data.fixed) deskElement.classList.add('fixed');
                        deskElement.style.transform = `rotate(${data.rotation}deg)`;
                        desks.push(deskObj);
                        seatingChartDiv.appendChild(deskElement);
                    }
                });
                arrangeAndScaleDesks();
            }

            function updateStudentList() {
                studentListUl.innerHTML = '';
                students.sort((a, b) => a.number - b.number).forEach(student => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${student.number}. ${student.name}</span>
                        <div><button class="btn-edit" onclick="editStudent(${student.id})">✏️</button>
                        <button class="btn-remove" onclick="removeStudent(${student.id})">❌</button></div>`;
                    studentListUl.appendChild(li);
                });
                studentNumberInput.value = students.length > 0 ? Math.max(...students.map(s => s.number)) + 1 : 1;
            }

            window.editStudent = (id) => {
                const s = students.find(x => x.id === id);
                if (!s) return;
                editingStudentId = id;
                studentNumberInput.value = s.number;
                studentNameInput.value = s.name;
                document.querySelector(`input[name="gender"][value="${s.gender}"]`).checked = true;
                document.getElementById('add-student-btn').textContent = '수정';
            };

            window.removeStudent = (id) => {
                students = students.filter(s => s.id !== id);
                updateStudentList(); saveToStorage();
            };

            document.getElementById('add-student-btn').onclick = () => {
                const name = studentNameInput.value.trim();
                const num = parseInt(studentNumberInput.value);
                const gender = document.querySelector('input[name="gender"]:checked').value;
                if (!name) return;
                if (editingStudentId) {
                    const s = students.find(x => x.id === editingStudentId);
                    s.name = name; s.number = num; s.gender = gender;
                    editingStudentId = null;
                    document.getElementById('add-student-btn').textContent = '추가/수정';
                } else {
                    students.push({ id: Date.now(), number: num, name, gender });
                }
                studentNameInput.value = ''; updateStudentList(); saveToStorage();
            };

            function createDeskElement(student, index) {
                const desk = document.createElement('div');
                desk.className = 'desk';
                if (areDesksHidden) desk.classList.add('hidden');
                desk.innerHTML = `<div class="desk-header">
                        <button class="desk-btn btn-swap">이동</button>
                        <button class="desk-btn btn-rotate">🔄</button>
                        <button class="desk-btn btn-fix">고정</button>
                    </div>
                    <div class="student-info">
                        <div><span class="student-number">${student.number}</span>. <span class="student-name">${student.name}</span></div>
                        <div class="student-gender">(${student.gender === 'M' ? '남' : '여'})</div>
                    </div>`;
                makeDraggable(desk);
                desk.addEventListener('click', (e) => {
                    if (selectedDeskForSwap && selectedDeskForSwap !== desk) handleDeskSwap(desk);
                });
                desk.querySelector('.btn-swap').addEventListener('click', (e) => {
                    e.stopPropagation(); handleSwapInit(desk);
                });
                return desk;
            }

            function handleSwapInit(deskElement) {
                if (selectedDeskForSwap) {
                    selectedDeskForSwap.classList.remove('selected-for-swap');
                    selectedDeskForSwap.querySelector('.btn-swap').classList.remove('active');
                }
                if (selectedDeskForSwap === deskElement) {
                    selectedDeskForSwap = null;
                } else {
                    selectedDeskForSwap = deskElement;
                    deskElement.classList.add('selected-for-swap');
                    deskElement.querySelector('.btn-swap').classList.add('active');
                }
            }

            function handleDeskSwap(targetDeskElement) {
                const deskA = desks.find(d => d.element === selectedDeskForSwap);
                const deskB = desks.find(d => d.element === targetDeskElement);
                const temp = deskA.student;
                deskA.student = deskB.student;
                deskB.student = temp;
                updateDeskInfo(deskA.element, deskA.student);
                updateDeskInfo(deskB.element, deskB.student);
                selectedDeskForSwap.classList.remove('selected-for-swap');
                selectedDeskForSwap.querySelector('.btn-swap').classList.remove('active');
                selectedDeskForSwap = null;
                saveToStorage();
            }

            function updateDeskInfo(el, student) {
                el.querySelector('.student-number').textContent = student.number;
                el.querySelector('.student-name').textContent = student.name;
                el.querySelector('.student-gender').textContent = `(${student.gender === 'M' ? '남' : '여'})`;
            }

            function getIdealPoints() {
                const cols = parseInt(document.getElementById('layout-cols').value) || 6;
                const isPair = document.getElementById('pair-mode').checked;
                const dir = document.querySelector('.direction-btn.active').dataset.dir;
                const totalStudents = students.length;
                const totalRows = isPair ? Math.ceil(Math.ceil(totalStudents / 2) / cols) : Math.ceil(totalStudents / cols);

                const points = [];
                for (let i = 0; i < totalStudents; i++) {
                    let rowIdx, colIdx, isRightInPair = false;
                    if (isPair) {
                        const pairIdx = Math.floor(i / 2);
                        isRightInPair = i % 2 !== 0;
                        if (dir === 'horizontal') {
                            rowIdx = Math.floor(pairIdx / cols); colIdx = pairIdx % cols;
                        } else {
                            rowIdx = pairIdx % totalRows; colIdx = Math.floor(pairIdx / totalRows);
                        }
                    } else {
                        if (dir === 'horizontal') {
                            rowIdx = Math.floor(i / cols); colIdx = i % cols;
                        } else {
                            rowIdx = i % totalRows; colIdx = Math.floor(i / totalRows);
                        }
                    }
                    const actualRow = isFlipped ? (totalRows - 1 - rowIdx) : rowIdx;
                    const actualCol = isFlipped ? (cols - 1 - colIdx) : colIdx;
                    let x = actualCol * (isPair ? (DESK_WIDTH * 2 + H_GAP + PAIR_GAP) : (DESK_WIDTH + H_GAP));
                    if (isPair && isFlipped) x += (isRightInPair ? 0 : DESK_WIDTH + PAIR_GAP);
                    else if (isPair) x += (isRightInPair ? DESK_WIDTH + PAIR_GAP : 0);
                    let y = actualRow * (DESK_HEIGHT + V_GAP);
                    points.push({ x, y });
                }
                return points;
            }

            function createLayout() {
                seatingChartDiv.innerHTML = '';
                desks = [];
                const sortedStudents = [...students].sort((a, b) => a.number - b.number);
                const points = getIdealPoints();
                sortedStudents.forEach((student, i) => {
                    const deskEl = createDeskElement(student, i);
                    deskEl.style.left = `${points[i].x}px`;
                    deskEl.style.top = `${points[i].y}px`;
                    desks.push({ element: deskEl, student: student, fixed: false, rotation: 0 });
                    seatingChartDiv.appendChild(deskEl);
                });
                arrangeAndScaleDesks();
                centerAlignAll(); 
                saveToStorage();
            }

            function arrangeAndScaleDesks() {
                if (desks.length === 0) return;
                const containerW = seatingChartArea.clientWidth;
                const containerH = seatingChartArea.clientHeight;
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                desks.forEach(d => {
                    const l = parseInt(d.element.style.left), t = parseInt(d.element.style.top);
                    minX = Math.min(minX, l); minY = Math.min(minY, t);
                    maxX = Math.max(maxX, l + DESK_WIDTH); maxY = Math.max(maxY, t + DESK_HEIGHT);
                });
                const groupW = maxX - minX, groupH = maxY - minY;
                const scale = Math.min((containerW - 80) / groupW, (containerH - 220) / groupH, 1.1);
                seatingChartDiv.style.width = `${maxX}px`;
                seatingChartDiv.style.height = `${maxY}px`;
                seatingChartDiv.style.transform = `scale(${scale})`;
                const scaledW = maxX * scale;
                seatingChartDiv.style.left = `${(containerW - scaledW) / 2}px`;
                seatingChartDiv.style.top = isFlipped ? `60px` : `100px`;
            }

            function centerAlignAll() {
                if (desks.length === 0) return;
                let minX = Infinity, maxX = -Infinity;
                desks.forEach(d => {
                    const l = parseInt(d.element.style.left);
                    minX = Math.min(minX, l); maxX = Math.max(maxX, l + DESK_WIDTH);
                });
                const groupW = maxX - minX;
                const chartBoxW = seatingChartDiv.offsetWidth;
                const offset = (chartBoxW - groupW) / 2 - minX;
                desks.forEach(d => { if (!d.fixed) d.element.style.left = (parseInt(d.element.style.left) + offset) + 'px'; });
                saveToStorage();
            }

            function alignAllDesks() {
                if (desks.length === 0) return;
                const points = getIdealPoints();
                desks.forEach(d => {
                    if (d.fixed) return;
                    const curX = parseInt(d.element.style.left), curY = parseInt(d.element.style.top);
                    let minD = Infinity, bestP = { x: curX, y: curY };
                    points.forEach(p => {
                        const dist = Math.sqrt((p.x - curX) ** 2 + (p.y - curY) ** 2);
                        if (dist < minD) { minD = dist; bestP = p; }
                    });
                    d.element.style.left = bestP.x + 'px';
                    d.element.style.top = bestP.y + 'px';
                });
                centerAlignAll();
                saveToStorage();
            }

            function updateFlipUI() {
                if (isFlipped) { teacherDesk.classList.replace('top', 'bottom'); } 
                else { teacherDesk.classList.replace('bottom', 'top'); }
                arrangeAndScaleDesks();
            }

            document.getElementById('toggle-flip').onclick = () => {
                isFlipped = !isFlipped;
                if (desks.length > 0) {
                    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                    desks.forEach(d => {
                        const l = parseInt(d.element.style.left), t = parseInt(d.element.style.top);
                        minX = Math.min(minX, l); maxX = Math.max(maxX, l);
                        minY = Math.min(minY, t); maxY = Math.max(maxY, t);
                    });
                    const midX = (minX + maxX); const midY = (minY + maxY);
                    desks.forEach(d => {
                        const curL = parseInt(d.element.style.left), curT = parseInt(d.element.style.top);
                        d.element.style.left = (midX - curL) + 'px';
                        d.element.style.top = (midY - curT) + 'px';
                    });
                }
                updateFlipUI();
                saveToStorage();
            };

            function makeDraggable(el) {
                let startX, startY, initialLeft, initialTop;
                let groupInits = [];
                el.onmousedown = e => {
                    if (e.target.classList.contains('desk-btn')) {
                        const d = desks.find(x => x.element === el);
                        if (e.target.classList.contains('btn-fix')) {
                            d.fixed = !d.fixed; el.classList.toggle('fixed');
                            e.target.textContent = d.fixed ? '해제' : '고정';
                        } else if (e.target.classList.contains('btn-rotate')) {
                            d.rotation = (d.rotation + 90) % 360;
                            el.style.transform = `rotate(${d.rotation}deg)`;
                        }
                        saveToStorage(); return;
                    }
                    const d = desks.find(x => x.element === el);
                    if (d.fixed) return;
                    el.classList.add('dragging');
                    seatingChartArea.classList.add('show-grid');
                    const scale = parseFloat(seatingChartDiv.style.transform.replace('scale(', '')) || 1;
                    startX = e.clientX; startY = e.clientY;
                    initialLeft = el.offsetLeft; initialTop = el.offsetTop;
                    const points = getIdealPoints();
                    
                    if (moveAllToggle.checked || e.shiftKey) {
                        groupInits = desks.map(d => ({ l: d.element.offsetLeft, t: d.element.offsetTop }));
                    }

                    document.onmousemove = me => {
                        const dx = (me.clientX - startX) / scale;
                        const dy = (me.clientY - startY) / scale;
                        if (moveAllToggle.checked || e.shiftKey) {
                            desks.forEach((d, i) => { if (!d.fixed) { 
                                d.element.style.left = (groupInits[i].l + dx) + 'px'; 
                                d.element.style.top = (groupInits[i].t + dy) + 'px'; } 
                            });
                        } else {
                            let nl = initialLeft + dx, nt = initialTop + dy;
                            // 근처 정답 포인트로 스냅
                            points.forEach(p => {
                                if (Math.abs(p.x - nl) < 20 && Math.abs(p.y - nt) < 20) { nl = p.x; nt = p.y; }
                            });
                            el.style.left = nl + 'px'; el.style.top = nt + 'px';
                        }
                    };
                    document.onmouseup = () => {
                        el.classList.remove('dragging');
                        seatingChartArea.classList.remove('show-grid');
                        document.onmousemove = null; document.onmouseup = null;
                        saveToStorage();
                    };
                };
            }

            document.getElementById('shuffle-seats').onclick = () => {
                const targets = desks.filter(d => !d.fixed);
                const studs = targets.map(d => d.student);
                for (let i = studs.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [studs[i], studs[j]] = [studs[j], studs[i]];
                }
                targets.forEach((d, i) => { d.student = studs[i]; updateDeskInfo(d.element, d.student); });
                saveToStorage();
            };

            document.getElementById('align-all-btn').onclick = alignAllDesks;
            document.getElementById('center-align-btn').onclick = centerAlignAll;
            document.getElementById('apply-layout').onclick = createLayout;
            document.getElementById('toggle-hide').onclick = () => {
                areDesksHidden = !areDesksHidden;
                desks.forEach(d => d.element.classList.toggle('hidden', areDesksHidden));
                document.getElementById('toggle-hide').textContent = areDesksHidden ? '이름 보이기' : '이름 가리기';
            };

            document.getElementById('delete-all-students').onclick = () => {
                confirmModalOverlay.style.display = 'flex';
                document.getElementById('confirm-modal-message').textContent = '명단과 배치를 전체 삭제하시겠습니까?';
                document.getElementById('confirm-modal-yes').onclick = () => {
                    students = []; desks = []; seatingChartDiv.innerHTML = '';
                    updateStudentList(); localStorage.clear();
                    confirmModalOverlay.style.display = 'none';
                };
            };

            document.getElementById('fullscreen-btn').onclick = () => { document.body.classList.add('fullscreen-mode'); setTimeout(arrangeAndScaleDesks, 300); };
            document.getElementById('exit-fullscreen-btn').onclick = () => { document.body.classList.remove('fullscreen-mode'); setTimeout(arrangeAndScaleDesks, 300); };

            document.getElementById('export-pdf').onclick = () => {
                const area = document.getElementById('seating-chart-area');
                const hs = area.querySelectorAll('.desk-header');
                hs.forEach(h => h.style.visibility = 'hidden');
                
                // 컨텐츠의 실제 범위를 계산하여 여백 확보
                html2canvas(area, { 
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    onclone: (clonedDoc) => {
                        const clonedArea = clonedDoc.getElementById('seating-chart-area');
                        clonedArea.style.padding = "40px"; // 상하좌우 여백 강제 추가
                    }
                }).then(canvas => {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('l', 'mm', 'a4');
                    const margin = 10;
                    const w = pdf.internal.pageSize.getWidth() - (margin * 2);
                    const h = (canvas.height * w) / canvas.width;
                    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, (pdf.internal.pageSize.getHeight() - h) / 2, w, h);
                    pdf.save('교실_자리배치도.pdf');
                    hs.forEach(h => h.style.visibility = 'visible');
                });
            };

            document.getElementById('upload-file').onclick = () => fileInput.click();
            fileInput.onchange = e => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                    students = [];
                    rows.forEach((r, i) => { if (i > 0 && r[1]) students.push({ id: Date.now() + i, number: parseInt(r[0]) || (students.length + 1), name: String(r[1]).trim(), gender: (r[2] === '여' || r[2] === 'F') ? 'F' : 'M' }); });
                    updateStudentList(); createLayout(); saveToStorage();
                };
                reader.readAsArrayBuffer(file);
            };

            document.querySelectorAll('.direction-btn').forEach(b => b.onclick = () => { 
                document.querySelectorAll('.direction-btn').forEach(x => x.classList.remove('active')); 
                b.classList.add('active'); 
            });
            document.getElementById('confirm-modal-no').onclick = () => confirmModalOverlay.style.display = 'none';

            window.onresize = arrangeAndScaleDesks;
            loadFromStorage();
        });
    </script>
</body>
</html>
