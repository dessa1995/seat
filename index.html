<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자리 배치 프로그램 - 기능 강화판</title>
    <!-- jsPDF and html2canvas for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- SheetJS for XLSX parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* --- Fonts and Basic Styles --- */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            --bg-color: #f0f8ff;
            --border-color: #4a4a4a;
            --desk-bg: #ffffff;
            --desk-fixed-bg: #ffd700;
            --desk-hidden-bg: #a0a0a0;
            --button-bg: #e0e0e0;
            --button-hover-bg: #c0c0c0;
            --accent-color: #ff6347;
            --text-color: #333;
            --guide-line-color: #2196F3;
            --move-all-color: #9c27b0;
        }

        body {
            font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100vh;
            box-sizing: border-box;
        }

        /* --- Custom Border Style --- */
        .custom-border {
            border: 4px solid var(--border-color);
            box-shadow: 4px 4px 0px 0px var(--border-color);
            background-color: white;
            padding: 1rem;
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            margin-bottom: 0;
        }

        h2, h3 {
            margin: 0 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 4px solid var(--border-color);
        }

        /* --- Layout: Controls and Seating Chart --- */
        .app-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            flex-grow: 1;
            min-height: 0;
        }

        .controls {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .seating-chart-container {
            flex: 3;
            min-width: 400px;
            position: relative;
            overflow: hidden; 
            background-color: #fff;
        }

        /* 드래그 시 눈금 배경 */
        .seating-chart-container.show-grid {
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- Buttons and Inputs --- */
        .btn, a.btn {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.9rem;
            padding: 0.6rem 0.8rem;
            border: 3px solid var(--border-color);
            background-color: var(--button-bg);
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s, transform 0.2s;
            box-shadow: 3px 3px 0px 0px var(--border-color);
            text-decoration: none;
            color: var(--text-color);
            display: inline-block;
            text-align: center;
            border-radius: 4px;
        }

        .btn:hover, .btn:focus, a.btn:hover, a.btn:focus {
            background-color: var(--button-hover-bg);
            box-shadow: 1px 1px 0px 0px var(--border-color);
            transform: translate(1px, 1px);
        }
        
        .btn:active, a.btn:active {
            box-shadow: 0px 0px 0px 0px var(--border-color);
            transform: translate(3px, 3px);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        
        #delete-all-students {
            background-color: var(--accent-color);
            color: white;
        }

        input[type="text"], input[type="number"] {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1rem;
            padding: 0.4rem;
            border: 3px solid var(--border-color);
            width: calc(100% - 1.2rem);
            border-radius: 4px;
        }
        
        .gender-select, #student-form > div {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        #student-form {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        /* --- Custom Layout Controls --- */
        .layout-controls {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .layout-controls div {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #layout-cols, #group-size {
            width: 60px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { display:none; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            border: 2px solid var(--border-color);
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            border: 2px solid var(--border-color);
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--guide-line-color); }
        #move-all-toggle:checked + .slider { background-color: var(--move-all-color); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* 배정 방향 선택 버튼 스타일 */
        .direction-btn-group {
            display: flex;
            border: 3px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            width: fit-content;
        }
        .direction-btn {
            padding: 5px 12px;
            cursor: pointer;
            background: #eee;
            border: none;
            font-weight: bold;
        }
        .direction-btn.active {
            background: var(--guide-line-color);
            color: white;
        }

        /* --- Student List --- */
        #student-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            max-height: 180px;
            overflow-y: auto;
            border: 3px solid var(--border-color);
            margin-top: 1rem;
            border-radius: 4px;
        }

        #student-list li {
            padding: 0.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        #student-list li:nth-child(even) { background-color: #f2f2f2; }
        .list-btn-group { display: flex; gap: 0.3rem; }
        .btn-edit, .btn-remove {
             background: var(--button-bg);
             border: 2px solid var(--border-color);
             cursor: pointer;
             padding: 1px 4px;
             border-radius: 4px;
        }

        /* --- Seating Chart & Desks --- */
        #teacher-desk {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 45px;
            background-color: #e6e6e6;
            border: 4px solid var(--border-color);
            box-shadow: 4px 4px 0px 0px var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            z-index: 100;
            border-radius: 8px;
        }
        
        #seating-chart {
            position: absolute;
            transform-origin: top left;
            transition: transform 0.3s ease-in-out, top 0.3s ease-in-out, left 0.3s ease-in-out;
        }
        
        /* 가이드 라인 */
        .guide-line {
            position: absolute;
            background-color: var(--guide-line-color);
            z-index: 99;
            display: none;
            pointer-events: none;
            opacity: 0.6;
        }
        .guide-line.v { width: 1.5px; height: 10000px; top: -5000px; }
        .guide-line.h { height: 1.5px; width: 10000px; left: -5000px; }

        .desk {
            position: absolute;
            width: 100px;
            height: 60px;
            background-color: var(--desk-bg);
            border: 4px solid var(--border-color);
            box-shadow: 4px 4px 0px 0px var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: grab;
            user-select: none;
            z-index: 10;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .desk.dragging {
            z-index: 1000;
            cursor: grabbing;
            opacity: 0.9;
            box-shadow: 8px 8px 15px rgba(0,0,0,0.15);
            transition: none !important; /* 드래그 시 딜레이 제거 */
        }

        .desk.fixed {
            background-color: var(--desk-fixed-bg);
            cursor: default;
        }
        
        .desk.hidden .student-info { visibility: hidden; }
        .desk.hidden { background-color: var(--desk-hidden-bg); }

        .desk-header {
            position: absolute;
            top: -2px;
            right: -2px;
            display: flex;
            gap: 2px;
        }

        .desk-btn {
            font-size: 0.6rem;
            padding: 1px 3px;
            border: 1.5px solid var(--border-color);
            background-color: var(--button-bg);
            cursor: pointer;
            border-radius: 3px;
        }
        
        .student-info {
            text-align: center;
            font-size: 0.85rem;
            line-height: 1.2;
        }
        
        .student-name { font-weight: bold; }
        .student-gender { font-size: 0.75rem; color: #555; }

        /* --- Fullscreen Mode --- */
        #fullscreen-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2020;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 1rem;
            border-radius: 8px;
            border: 4px solid var(--border-color);
            box-shadow: 4px 4px 0px 0px var(--border-color);
        }
        body.fullscreen-mode #fullscreen-controls { display: flex; gap: 0.5rem; }
        body.fullscreen-mode .controls, body.fullscreen-mode h1 { display: none; }
        body.fullscreen-mode .seating-chart-container {
            width: 100vw; height: 100vh; position: fixed;
            top: 0; left: 0; z-index: 2000; padding: 1rem;
            box-sizing: border-box; border: none; box-shadow: none;
        }
        
        /* --- Modal --- */
        #confirm-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); z-index: 3000;
            display: none; justify-content: center; align-items: center;
        }
        #confirm-modal {
            background: white; padding: 2rem; border-radius: 8px;
            border: 4px solid var(--border-color); box-shadow: 4px 4px 0px 0px var(--border-color);
            text-align: center;
        }

        @media (max-width: 768px) {
            body { height: auto; }
            .app-container { flex-direction: column; }
            .controls, .seating-chart-container { width: 100%; min-height: 500px; }
        }
    </style>
</head>
<body>

    <h1>자리 배치 프로그램</h1>

    <div class="app-container">
        <!-- Control Panel -->
        <div class="controls custom-border">
            <!-- Student Management -->
            <section>
                <h2>학생 명렬</h2>
                <div class="btn-group">
                    <a href="https://drive.google.com/uc?export=download&id=14U3BCnAlipCbsPWru9v-FhlXM8fQC_w7" download="학생명단_양식.xlsx" class="btn">명단 양식 내려받기</a>
                    <button id="upload-file" class="btn">명단 업로드 (PC)</button>
                    <input type="file" id="file-input" accept=".csv, .xlsx" style="display: none;">
                </div>
                <div class="btn-group" style="margin-top: 0.5rem;">
                    <button id="download-current-csv" class="btn">현재 명단 저장</button>
                    <button id="delete-all-students" class="btn">전체 삭제</button>
                </div>
                 <div id="student-form">
                    <input type="number" id="student-number" placeholder="번호 (자동 부여)">
                    <input type="text" id="student-name" placeholder="이름" required>
                    <div class="gender-select">
                        <label><input type="radio" name="gender" value="M" checked> 남</label>
                        <label><input type="radio" name="gender" value="F"> 여</label>
                    </div>
                    <button id="add-student-btn" class="btn">학생 추가/수정</button>
                </div>
                <ul id="student-list"></ul>
            </section>

            <!-- Layout Selection -->
            <section>
                <h3>책상 배치 설정</h3>
                <div class="layout-controls">
                    <div>
                        <label>배정 방향:</label>
                        <div class="direction-btn-group">
                            <button class="direction-btn active" data-dir="horizontal">가로 우선</button>
                            <button class="direction-btn" data-dir="vertical">세로 우선</button>
                        </div>
                    </div>
                    <div id="standard-layout-controls">
                        <div>
                            <label for="pair-mode">짝꿍 모드</label>
                            <label class="switch">
                                <input type="checkbox" id="pair-mode">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div>
                            <label for="layout-cols" id="layout-cols-label">한 줄에</label>
                            <input type="number" id="layout-cols" value="5" min="1">
                            <span id="unit-label">명</span>
                        </div>
                    </div>
                    <button id="apply-layout" class="btn">배치 적용 (초기화)</button>
                </div>
            </section>

            <!-- Actions -->
            <section>
                <h3>자리 바꾸기 & 정돈</h3>
                <div class="btn-group">
                    <button id="shuffle-seats" class="btn" style="background-color: #ffeb3b;">섞기 (랜덤 배정)</button>
                    <button id="center-align-btn" class="btn" style="background-color: #2196f3; color: white;">전체 가운데 정렬</button>
                    <button id="align-all-btn" class="btn" style="background-color: #8bc34a; color: white;">책상 줄 맞추기 (격자)</button>
                </div>
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
                    <label for="move-all-toggle" style="font-weight: bold; font-size: 0.9rem;">모든 책상 함께 이동</label>
                    <label class="switch">
                        <input type="checkbox" id="move-all-toggle">
                        <span class="slider"></span>
                    </label>
                    <span style="font-size: 0.8rem; color: #666;">(또는 Shift+드래그)</span>
                </div>
                <div class="btn-group" style="margin-top: 10px;">
                    <button id="toggle-hide" class="btn">책상 가리기</button>
                    <button id="fullscreen-btn" class="btn">전체 화면</button>
                    <button id="save-preset" class="btn">현재 상태 저장</button>
                    <button id="export-pdf" class="btn">PDF 저장</button>
                </div>
                <p style="font-size: 0.8rem; color: #666; margin-top: 8px;">* 책상을 드래그하여 옮길 수 있습니다. 줄 맞춤 가이드가 표시됩니다.</p>
            </section>
        </div>

        <!-- Seating Chart -->
        <div id="seating-chart-area" class="seating-chart-container custom-border">
            <div id="teacher-desk">교탁</div>
            
            <!-- 가이드 라인 요소들 -->
            <div id="guide-v" class="guide-line v"></div>
            <div id="guide-h" class="guide-line h"></div>

            <div id="fullscreen-controls">
                <button id="fs-shuffle-btn" class="btn">랜덤 섞기</button>
                <button id="fs-align-btn" class="btn">격자 정렬</button>
                <button id="fs-toggle-hide-btn" class="btn">가리기/보이기</button>
                <button id="exit-fullscreen-btn" class="btn">나가기</button>
            </div>
            <div id="seating-chart">
                <!-- Desks will be generated here -->
            </div>
        </div>
    </div>
    
    <div id="confirm-modal-overlay">
        <div id="confirm-modal">
            <p id="confirm-modal-message"></p>
            <div class="btn-group">
                <button id="confirm-modal-yes" class="btn">확인</button>
                <button id="confirm-modal-no" class="btn">취소</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- State Management ---
            let students = [];
            let desks = []; // { element, student, fixed, originalIndex, rotation, x, y }
            let nextStudentNumber = 1;
            let areDesksHidden = false;
            let currentLayout = { 
                mode: 'standard', 
                cols: 5, 
                isPair: false, 
                direction: 'horizontal' // 'horizontal' or 'vertical'
            };
            let editingStudentId = null;

            // --- Constants ---
            const DESK_WIDTH = 100;
            const DESK_HEIGHT = 60;
            const GRID_SIZE = 10;

            // --- DOM Elements ---
            const uploadBtn = document.getElementById('upload-file');
            const fileInput = document.getElementById('file-input');
            const downloadCurrentCsvBtn = document.getElementById('download-current-csv');
            const deleteAllStudentsBtn = document.getElementById('delete-all-students');
            const studentNumberInput = document.getElementById('student-number');
            const studentNameInput = document.getElementById('student-name');
            const addStudentBtn = document.getElementById('add-student-btn');
            const studentListUl = document.getElementById('student-list');
            const seatingChartArea = document.getElementById('seating-chart-area');
            const seatingChartDiv = document.getElementById('seating-chart');
            const shuffleBtn = document.getElementById('shuffle-seats');
            const centerAlignBtn = document.getElementById('center-align-btn');
            const alignAllBtn = document.getElementById('align-all-btn');
            const toggleHideBtn = document.getElementById('toggle-hide');
            const moveAllToggle = document.getElementById('move-all-toggle');
            const savePresetBtn = document.getElementById('save-preset');
            const exportPdfBtn = document.getElementById('export-pdf');
            const pairModeCheckbox = document.getElementById('pair-mode');
            const layoutColsInput = document.getElementById('layout-cols');
            const applyLayoutBtn = document.getElementById('apply-layout');
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            const exitFullscreenBtn = document.getElementById('exit-fullscreen-btn');
            
            const guideV = document.getElementById('guide-v');
            const guideH = document.getElementById('guide-h');

            const dirBtns = document.querySelectorAll('.direction-btn');
            const confirmModalOverlay = document.getElementById('confirm-modal-overlay');
            const confirmModalMessage = document.getElementById('confirm-modal-message');
            const confirmModalYes = document.getElementById('confirm-modal-yes');
            const confirmModalNo = document.getElementById('confirm-modal-no');

            // --- Modal Logic ---
            let confirmCallback = null;
            function showConfirm(message, callback) {
                confirmModalMessage.textContent = message;
                confirmCallback = callback;
                confirmModalOverlay.style.display = 'flex';
            }
            function hideConfirm() {
                confirmModalOverlay.style.display = 'none';
                confirmCallback = null;
            }

            // --- Student Management ---
            function saveStudent() {
                const name = studentNameInput.value.trim();
                if (!name) return;
                const number = parseInt(studentNumberInput.value);
                const gender = document.querySelector('input[name="gender"]:checked').value;

                if (students.some(s => s.number === number && s.id !== editingStudentId)) {
                    alert('이미 사용 중인 번호입니다.');
                    return;
                }
                
                if (editingStudentId) {
                    const student = students.find(s => s.id === editingStudentId);
                    if (student) {
                        student.number = isNaN(number) ? student.number : number;
                        student.name = name;
                        student.gender = gender;
                    }
                } else {
                    const finalNumber = isNaN(number) ? nextStudentNumber : number;
                    students.push({ id: Date.now(), number: finalNumber, name, gender });
                }

                students.sort((a, b) => a.number - b.number);
                cancelEdit();
                updateStudentList();
                updateNextStudentNumber();
            }
            
            function editStudent(id) {
                const student = students.find(s => s.id === id);
                if (student) {
                    editingStudentId = id;
                    studentNumberInput.value = student.number;
                    studentNameInput.value = student.name;
                    document.querySelector(`input[name="gender"][value="${student.gender}"]`).checked = true;
                    addStudentBtn.textContent = '학생 수정 완료';
                    studentNameInput.focus();
                }
            }

            function cancelEdit() {
                editingStudentId = null;
                studentNumberInput.value = '';
                studentNameInput.value = '';
                document.querySelector('input[name="gender"][value="M"]').checked = true;
                addStudentBtn.textContent = '학생 추가/수정';
            }

            function removeStudent(id) {
                students = students.filter(s => s.id !== id);
                updateStudentList();
                updateNextStudentNumber();
            }

            function updateStudentList() {
                studentListUl.innerHTML = '';
                students.forEach(student => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${student.number}. ${student.name} (${student.gender})</span>
                        <div class="list-btn-group">
                            <button class="btn-edit" data-id="${student.id}">편집</button>
                            <button class="btn-remove" data-id="${student.id}">삭제</button>
                        </div>
                    `;
                    studentListUl.appendChild(li);
                });
            }
            
            function updateNextStudentNumber() {
                nextStudentNumber = students.length === 0 ? 1 : Math.max(...students.map(s => s.number)) + 1;
                studentNumberInput.placeholder = `번호 (${nextStudentNumber} 자동)`;
            }

            // --- Layout Management ---
            function handleLayoutApply() {
                currentLayout.cols = parseInt(layoutColsInput.value) || 5;
                currentLayout.isPair = pairModeCheckbox.checked;
                createLayout();
            }

            function createLayout() {
                if (students.length === 0) {
                    seatingChartDiv.innerHTML = '';
                    desks = [];
                    return;
                }
                
                desks = [];
                for (let i = 0; i < students.length; i++) {
                    const student = students[i];
                    const deskElement = createDeskElement(student, i);
                    desks.push({ 
                        element: deskElement, 
                        student: student, 
                        fixed: false, 
                        originalIndex: i, 
                        rotation: 0 
                    });
                }
                arrangeAndScaleDesks();
            }

            function arrangeInStandard() {
                seatingChartDiv.innerHTML = '';
                desks.forEach(d => seatingChartDiv.appendChild(d.element));

                const { cols, isPair, direction } = currentLayout;
                const studentCount = desks.length;
                const hGap = 20;
                const vGap = 40;
                const pairGap = 10;

                const effectiveItems = isPair ? Math.ceil(studentCount / 2) : studentCount;
                const totalRows = Math.ceil(effectiveItems / cols);

                for (let i = 0; i < studentCount; i++) {
                    const desk = desks[i].element;
                    let x, y;
                    
                    if (isPair) {
                        const pairIndex = Math.floor(i / 2);
                        const isRightInPair = i % 2 !== 0;
                        const pairWidth = DESK_WIDTH * 2 + pairGap;

                        let r, c;
                        if (direction === 'horizontal') {
                            r = Math.floor(pairIndex / cols);
                            c = pairIndex % cols;
                        } else {
                            r = pairIndex % totalRows;
                            c = Math.floor(pairIndex / totalRows);
                        }

                        x = c * (pairWidth + hGap) + (isRightInPair ? DESK_WIDTH + pairGap : 0);
                        y = r * (DESK_HEIGHT + vGap);
                    } else {
                        let r, c;
                        if (direction === 'horizontal') {
                            r = Math.floor(i / cols);
                            c = i % cols;
                        } else {
                            r = i % totalRows;
                            c = Math.floor(i / totalRows);
                        }
                        x = c * (DESK_WIDTH + hGap);
                        y = r * (DESK_HEIGHT + vGap);
                    }
                    
                    desk.style.left = `${x}px`;
                    desk.style.top = `${y}px`;
                }
            }

            function arrangeAndScaleDesks() {
                if (desks.length === 0) return;
                
                seatingChartDiv.style.transform = 'scale(1)';
                arrangeInStandard();

                let maxW = 0, maxH = 0;
                desks.forEach(d => {
                    maxW = Math.max(maxW, d.element.offsetLeft + d.element.offsetWidth);
                    maxH = Math.max(maxH, d.element.offsetTop + d.element.offsetHeight);
                });

                const containerW = seatingChartArea.clientWidth;
                const containerH = seatingChartArea.clientHeight;
                const topOffset = 100;
                
                const scale = Math.min(containerW / (maxW + 40), (containerH - topOffset) / (maxH + 40), 1);
                
                seatingChartDiv.style.width = `${maxW}px`;
                seatingChartDiv.style.height = `${maxH}px`;
                seatingChartDiv.style.transform = `scale(${scale})`;
                seatingChartDiv.style.left = `${(containerW - maxW * scale) / 2}px`;
                seatingChartDiv.style.top = `${topOffset}px`;
            }

            function createDeskElement(student, index) {
                const desk = document.createElement('div');
                desk.className = 'desk';
                desk.dataset.index = index;
                desk.innerHTML = `
                    <div class="desk-header">
                        <button class="desk-btn btn-rotate" title="90도 회전">🔄</button>
                        <button class="desk-btn btn-fix">고정</button>
                    </div>
                    <div class="student-info">
                        <div><span class="student-number">${student.number}</span>. <span class="student-name">${student.name}</span></div>
                        <div class="student-gender">(${student.gender})</div>
                    </div>
                `;
                makeDraggable(desk);
                return desk;
            }

            // --- Core Functions ---
            
            // 전체 가운데 정렬
            function centerAlignAll() {
                if (desks.length === 0) return;
                
                // 현재 책상들의 영역 계산
                let minX = Infinity;
                let maxX = -Infinity;
                
                desks.forEach(d => {
                    const left = parseFloat(d.element.style.left);
                    minX = Math.min(minX, left);
                    maxX = Math.max(maxX, left + DESK_WIDTH);
                });
                
                const currentCenter = (minX + maxX) / 2;
                const containerWidth = seatingChartDiv.offsetWidth;
                const targetCenter = containerWidth / 2;
                const offset = targetCenter - currentCenter;
                
                desks.forEach(d => {
                    const left = parseFloat(d.element.style.left);
                    d.element.style.left = (left + offset) + 'px';
                });
            }

            function alignAllDesks() {
                if (desks.length === 0) return;
                desks.forEach(deskData => {
                    if (deskData.fixed) return;
                    const el = deskData.element;
                    const snappedLeft = Math.round(el.offsetLeft / 20) * 20;
                    const snappedTop = Math.round(el.offsetTop / 20) * 20;
                    el.style.left = snappedLeft + 'px';
                    el.style.top = snappedTop + 'px';
                });
            }

            function shuffleSeats() {
                const unfixedDesks = desks.filter(d => !d.fixed);
                const unfixedStudents = unfixedDesks.map(d => d.student);
                for (let i = unfixedStudents.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [unfixedStudents[i], unfixedStudents[j]] = [unfixedStudents[j], unfixedStudents[i]];
                }
                unfixedDesks.forEach((deskData, i) => {
                    deskData.student = unfixedStudents[i];
                    updateDeskInfo(deskData.element, deskData.student);
                });
            }

            function updateDeskInfo(deskElement, student) {
                deskElement.querySelector('.student-number').textContent = student.number;
                deskElement.querySelector('.student-name').textContent = student.name;
                deskElement.querySelector('.student-gender').textContent = `(${student.gender})`;
            }

            function toggleDeskFix(deskElement) {
                const deskData = desks.find(d => d.element === deskElement);
                if (deskData) {
                    deskData.fixed = !deskData.fixed;
                    deskElement.classList.toggle('fixed');
                    deskElement.querySelector('.btn-fix').textContent = deskData.fixed ? '해제' : '고정';
                }
            }
            
            function rotateDesk(deskElement) {
                const deskData = desks.find(d => d.element === deskElement);
                if (deskData) {
                    deskData.rotation = (deskData.rotation + 90) % 360;
                    deskElement.style.transform = `rotate(${deskData.rotation}deg)`;
                }
            }
            
            function toggleHideAll() {
                areDesksHidden = !areDesksHidden;
                desks.forEach(d => d.element.classList.toggle('hidden', areDesksHidden));
                toggleHideBtn.textContent = areDesksHidden ? '전체 공개' : '책상 가리기';
            }

            // --- Drag and Drop Logic ---
            function makeDraggable(element) {
                element.onmousedown = e => {
                    if (e.target.classList.contains('desk-btn')) return;
                    
                    const deskData = desks.find(d => d.element === element);
                    if (!deskData || deskData.fixed) return;
                    
                    element.classList.add('dragging');
                    seatingChartArea.classList.add('show-grid');

                    const scale = parseFloat(seatingChartDiv.style.transform.replace('scale(', '')) || 1;
                    const startX = e.clientX;
                    const startY = e.clientY;

                    // 그룹 이동 여부 확인
                    const isGroupMove = moveAllToggle.checked || e.shiftKey;
                    
                    // 시작 위치 저장
                    const initialPositions = desks.map(d => ({
                        el: d.element,
                        left: d.element.offsetLeft,
                        top: d.element.offsetTop,
                        isTarget: d.element === element
                    }));

                    document.onmousemove = e_drag => {
                        const dx = (e_drag.clientX - startX) / scale;
                        const dy = (e_drag.clientY - startY) / scale;
                        
                        if (isGroupMove) {
                            // 모든 책상 일괄 이동
                            initialPositions.forEach(pos => {
                                pos.el.style.left = (pos.left + dx) + 'px';
                                pos.el.style.top = (pos.top + dy) + 'px';
                            });
                        } else {
                            // 개별 이동 및 정렬 가이드
                            let currentLeft = initialPositions.find(p => p.isTarget).left + dx;
                            let currentTop = initialPositions.find(p => p.isTarget).top + dy;

                            let showV = false, showH = false;
                            let guideX = 0, guideY = 0;
                            const snapThreshold = 6;

                            desks.forEach(other => {
                                if (other.element === element) return;
                                const o = other.element;
                                
                                const cxPoints = [o.offsetLeft, o.offsetLeft + DESK_WIDTH/2, o.offsetLeft + DESK_WIDTH];
                                const mxPoints = [currentLeft, currentLeft + DESK_WIDTH/2, currentLeft + DESK_WIDTH];
                                
                                cxPoints.forEach(cx => {
                                    mxPoints.forEach((mx) => {
                                        if (Math.abs(cx - mx) < snapThreshold) {
                                            currentLeft -= (mx - cx);
                                            guideX = cx;
                                            showV = true;
                                        }
                                    });
                                });

                                const cyPoints = [o.offsetTop, o.offsetTop + DESK_HEIGHT/2, o.offsetTop + DESK_HEIGHT];
                                const myPoints = [currentTop, currentTop + DESK_HEIGHT/2, currentTop + DESK_HEIGHT];
                                
                                cyPoints.forEach(cy => {
                                    myPoints.forEach((my) => {
                                        if (Math.abs(cy - my) < snapThreshold) {
                                            currentTop -= (my - cy);
                                            guideY = cy;
                                            showH = true;
                                        }
                                    });
                                });
                            });

                            element.style.left = `${currentLeft}px`;
                            element.style.top = `${currentTop}px`;

                            if (showV) {
                                guideV.style.display = 'block';
                                guideV.style.left = (guideX * scale) + seatingChartDiv.offsetLeft + 'px';
                            } else guideV.style.display = 'none';

                            if (showH) {
                                guideH.style.display = 'block';
                                guideH.style.top = (guideY * scale) + seatingChartDiv.offsetTop + 'px';
                            } else guideH.style.display = 'none';
                        }
                    };

                    document.onmouseup = () => {
                        element.classList.remove('dragging');
                        seatingChartArea.classList.remove('show-grid');
                        guideV.style.display = 'none';
                        guideH.style.display = 'none';
                        document.onmouseup = null;
                        document.onmousemove = null;
                    };
                };
            }

            // --- File & Helper Functions ---
            function processData(data) {
                students = [];
                for (let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if (row.length < 2 || !row[1]) continue;
                    students.push({
                        id: Date.now() + Math.random(),
                        number: parseInt(row[0]) || (students.length + 1),
                        name: String(row[1]).trim(),
                        gender: row[2] === '여' || row[2] === 'F' ? 'F' : 'M'
                    });
                }
                students.sort((a, b) => a.number - b.number);
                updateStudentList();
                updateNextStudentNumber();
                handleLayoutApply();
            }

            // --- Event Listeners ---
            addStudentBtn.addEventListener('click', saveStudent);
            
            dirBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    dirBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLayout.direction = btn.dataset.dir;
                });
            });

            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const data = new Uint8Array(ev.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                    processData(json);
                };
                reader.readAsArrayBuffer(file);
            });

            downloadCurrentCsvBtn.addEventListener('click', () => {
                if (students.length === 0) return;
                const csv = Papa.unparse(students.map(s => [s.number, s.name, s.gender === 'M' ? '남' : '여']));
                const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "학생명단.csv";
                link.click();
            });

            deleteAllStudentsBtn.addEventListener('click', () => {
                showConfirm('모든 명단을 삭제하시겠습니까?', () => {
                    students = []; desks = []; seatingChartDiv.innerHTML = '';
                    updateStudentList(); updateNextStudentNumber();
                });
            });

            confirmModalYes.addEventListener('click', () => { if (confirmCallback) confirmCallback(); hideConfirm(); });
            confirmModalNo.addEventListener('click', hideConfirm);

            applyLayoutBtn.addEventListener('click', handleLayoutApply);
            shuffleBtn.addEventListener('click', shuffleSeats);
            centerAlignBtn.addEventListener('click', centerAlignAll);
            alignAllBtn.addEventListener('click', alignAllDesks);
            toggleHideBtn.addEventListener('click', toggleHideAll);
            
            seatingChartDiv.addEventListener('click', e => {
                const desk = e.target.closest('.desk');
                if (!desk) return;
                if (e.target.classList.contains('btn-fix')) toggleDeskFix(desk);
                else if (e.target.classList.contains('btn-rotate')) rotateDesk(desk);
                else if (areDesksHidden) desk.classList.remove('hidden');
            });

            fullscreenBtn.addEventListener('click', () => {
                document.body.classList.add('fullscreen-mode');
                setTimeout(arrangeAndScaleDesks, 100);
            });
            exitFullscreenBtn.addEventListener('click', () => {
                document.body.classList.remove('fullscreen-mode');
                setTimeout(arrangeAndScaleDesks, 100);
            });
            
            document.getElementById('fs-shuffle-btn').addEventListener('click', shuffleSeats);
            document.getElementById('fs-align-btn').addEventListener('click', alignAllDesks);
            document.getElementById('fs-toggle-hide-btn').addEventListener('click', toggleHideAll);

            savePresetBtn.addEventListener('click', () => {
                const state = desks.map(d => ({
                    id: d.student.id,
                    left: d.element.style.left,
                    top: d.element.style.top,
                    rotation: d.rotation,
                    fixed: d.fixed
                }));
                localStorage.setItem('seating_preset', JSON.stringify(state));
                alert('현재 상태가 브라우저에 저장되었습니다.');
            });

            exportPdfBtn.addEventListener('click', () => {
                const chart = document.getElementById('seating-chart-area');
                const headers = chart.querySelectorAll('.desk-header');
                headers.forEach(h => h.style.display = 'none');
                
                html2canvas(chart, { scale: 2 }).then(canvas => {
                    const img = canvas.toDataURL('image/png');
                    const pdf = new jspdf.jsPDF('l', 'px', [canvas.width, canvas.height]);
                    pdf.addImage(img, 'PNG', 0, 0, canvas.width, canvas.height);
                    pdf.save('좌석배치도.pdf');
                    headers.forEach(h => h.style.display = 'flex');
                });
            });

            window.addEventListener('resize', arrangeAndScaleDesks);
            updateNextStudentNumber();
        });
    </script>
</body>
</html>
